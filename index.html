<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagen</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="src/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 19l7-7 3 3-7 7-3-3z"></path>
                        <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path>
                        <path d="M2 2l7.586 7.586"></path>
                        <circle cx="11" cy="11" r="2"></circle>
                    </svg>
                    Imagen
                </h1>
            </div>

            <!-- Reference Images Section -->
            <div class="reference-section">
                <h3>Reference Images</h3>
                <div class="reference-slots" id="referenceSlots">
                    <!-- Slots rendered dynamically by JS -->
                </div>
                <button type="button" class="btn btn-ghost" id="clearReferences">Clear All References</button>
            </div>

            <!-- Model Selection -->
            <div class="config-section">
                <h3>Model</h3>
                <div class="custom-select" id="modelSelectContainer">
                    <div class="custom-select-trigger" id="modelSelectTrigger">
                        <span id="modelSelectValue">Gemini 2.5 Flash Image</span>
                        <span class="custom-select-arrow">▾</span>
                    </div>
                    <div class="custom-select-options" id="modelSelectOptions">
                        <div class="custom-select-option selected" data-value="recraft/recraft-v4.1">Recraft V4.1</div>
                    </div>
                </div>
            </div>

            <!-- Image Quality (Gemini specific) -->
            <div class="config-section" id="geminiOptions">
                <h3>Image Size</h3>
                <div class="button-group">
                    <button class="btn-toggle active" data-size="1024x1024" data-quality="1K">1K</button>
                    <button class="btn-toggle" data-size="2048x2048" data-quality="2K">2K</button>
                    <button class="btn-toggle" data-size="4096x4096" data-quality="4K">4K</button>
                </div>
            </div>

            <!-- Aspect Ratio -->
            <div class="config-section">
                <h3>Aspect Ratio</h3>
                <div class="aspect-grid">
                    <button class="btn-aspect active" data-ratio="1:1">1:1</button>
                    <button class="btn-aspect" data-ratio="16:9">16:9</button>
                    <button class="btn-aspect" data-ratio="9:16">9:16</button>
                    <button class="btn-aspect" data-ratio="4:3">4:3</button>
                    <button class="btn-aspect" data-ratio="3:4">3:4</button>
                    <button class="btn-aspect" data-ratio="3:2">3:2</button>
                </div>
            </div>

            <!-- Number of Images -->
            <div class="config-section">
                <h3>Number of Images</h3>
                <div class="number-input-group">
                    <button type="button" class="btn-number" id="decreaseCount">−</button>
                    <input type="number" id="imageCount" value="1" min="1" max="8" class="number-input">
                    <button type="button" class="btn-number" id="increaseCount">+</button>
                </div>
            </div>

            <!-- API Key -->
            <div class="config-section">
                <h3>OpenRouter API Key</h3>
                <input type="password" id="apiKey" placeholder="sk-or-..." class="text-input">
                <button type="button" class="btn btn-ghost" id="saveApiKey">Save Key</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Prompt Area -->
            <div class="prompt-area">
                <div class="prompt-container">
                    <textarea id="promptInput" placeholder="Describe the image you want to generate..."
                        rows="3"></textarea>
                    <div class="prompt-actions">
                        <span class="char-count" id="charCount">0 chars</span>
                        <button type="button" class="btn btn-primary" id="generateBtn">
                            Generate
                        </button>
                    </div>
                </div>
            </div>

            <!-- Gallery -->
            <div class="gallery-header">
                <h2>Generated Images</h2>
                <div class="gallery-actions">
                    <button type="button" class="btn btn-ghost" id="clearGallery">Clear Gallery</button>
                </div>
            </div>
            
            <!-- Ta galerie toute neuve, le message moche est supprimé définitivement -->
            <div class="gallery" id="gallery"></div>

                </div>
            </div>
        </main>
    </div>

    <!-- Image Modal -->
    <div class="modal" id="imageModal">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-content">
            <button class="modal-close" id="modalClose">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <img src="" alt="Full size image" id="modalImage">
            <div class="modal-actions">
                <button class="btn btn-secondary" id="useAsReference">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    Use as Reference
                </button>
                <button class="btn btn-secondary" id="recreateImage">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <polyline points="1 20 1 14 7 14"></polyline>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                    Recreate
                </button>
                <button class="btn btn-secondary" id="downloadImage">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Download
                </button>
            </div>
            <div class="modal-metadata" id="modalMetadata">
                <!-- Metadata will be injected here -->
            </div>
        </div>
    </div>

    <script src="src/app.js"></script>
</body>

    <!-- ========================================== -->
<!-- CONDITION DE LA BICHETTE : LOOK RECRAFT PRO -->
<!-- ========================================== -->
<style>
    /* Fond élégant style studio de création / Recraft */
    body {
        background-color: #121214 !important;
        color: #f4f4f5 !important;
    }

    /* Bouton Generate en Orange Safran Éclatant (Couleur design) */
    #generateBtn, .btn-primary {
        background: linear-gradient(135deg, #f97316, #ea580c) !important;
        border: none !important;
        box-shadow: 0 4px 14px rgba(249, 115, 22, 0.3) !important;
        transition: all 0.3s ease !important;
        color: white !important;
        font-weight: 600 !important;
    }

    #generateBtn:hover, .btn-primary:hover {
        transform: translateY(-2px) !important;
        box-shadow: 0 6px 20px rgba(249, 115, 22, 0.5) !important;
    }

    /* Bordure subtile orange pour la zone de texte du Prompt */
    .prompt-container {
        border: 2px solid #f97316 !important;
        background-color: #1a1a1e !important;
        border-radius: 12px !important;
    }

    /* Sidebar style sombre épuré */
    .sidebar, aside, [class*="sidebar"] {
        background-color: #1a1a1e !important;
        border-right: 1px solid #27272a !important;
    }

    /* Boutons de sélection actifs (Taille, Aspect) assortis en orange */
    .btn-toggle.active, .btn-aspect.active {
        background-color: #f97316 !important;
        color: white !important;
        border-color: #ea580c !important;
    }
</style>

<script>
    // Change automatiquement le titre pour afficher la marque Recraft
    document.addEventListener("DOMContentLoaded", () => {
        const mainTitle = document.querySelector(".gallery-header h2") || document.querySelector("h2");
        if (mainTitle) {
            mainTitle.innerHTML = "🎨 Recraft V4 AI Studio";
        }
    });
</script>
<!-- ========================================== -->
    <style>#galleryEmpty, .gallery-empty { display: none !important; }</style>
    
</html>
